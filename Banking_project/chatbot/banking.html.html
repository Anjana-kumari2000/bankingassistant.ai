<!DOCTYPE html>
<html>
<head>
    <title>Banking Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }
        #chatbox {
            width: 400px;
            height: 500px;
            border: 1px solid #ccc;
            overflow-y: auto;
            padding: 10px;
            background: #fff;
            margin: 20px auto;
        }
        .user {
            text-align: right;
            color: blue;
            margin: 5px;
        }
        .bot {
            text-align: left;
            color: green;
            margin: 5px;
        }
        #inputArea {
            width: 400px;
            margin: auto;
            display: flex;
        }
        input {
            flex: 1;
            padding: 10px;
        }
        button {
            padding: 10px;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">🏦 Banking Chatbot</h2>

<div id="chatbox"></div>

<div id="inputArea">
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
    let inputField = document.getElementById("userInput");
    let message = inputField.value;

    if (!message) return;

    // Show user message
    let chatbox = document.getElementById("chatbox");
    chatbox.innerHTML += `<div class="user">${message}</div>`;

    inputField.value = "";

    // Send to Rasa
    let response = await fetch("http://localhost:5005/webhooks/rest/webhook", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            sender: "user",
            message: message
        })
    });

    let data = await response.json();

    // Show bot response
    data.forEach(msg => {
        chatbox.innerHTML += `<div class="bot">${msg.text}</div>`;
    });

    chatbox.scrollTop = chatbox.scrollHeight;
}
</script>

</body>
</html>
